<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1b22" />
    <meta name="color-scheme" content="dark" />
    <title>FitOS — Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #1a1b22;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      main {
        max-width: 20rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1.25rem;
        font-size: 0.9rem;
        line-height: 1.5;
        color: #94a3b8;
      }
      button {
        border: none;
        border-radius: 0.5rem;
        padding: 0.625rem 1rem;
        background: #34d399;
        color: #0f172a;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You&apos;re offline</h1>
      <p>FitOS needs a connection to load your data. Check your network and try again.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
